name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  INSTANCE_ID: i-REPLACE_ME
  DEPLOY_BRANCH: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::123456789012:role/booking-movie-ticket-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via ASG Instance Refresh
        shell: bash
        run: |
          echo "Starting ASG Instance Refresh for booking-movie-asg..."
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "booking-movie-asg" \
            --preferences '{"MinHealthyPercentage": 100}' \
            --query "InstanceRefreshId" \
            --output text)
            
          echo "Instance Refresh Started: $REFRESH_ID"
          echo "Monitoring refresh status..."
          
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "booking-movie-asg" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)
            
            echo "Current status: $STATUS"
            if [ "$STATUS" = "Successful" ]; then
              echo "Deployment Successful!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment Failed or Cancelled!"
              exit 1
            fi
            sleep 30
          done
