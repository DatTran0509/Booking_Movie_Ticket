name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  ASG_NAME: booking-movie-asg
  ECR_PREFIX: booking-movie-ticket

jobs:
  build-server:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/booking-movie-ticket-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: echo "image-tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Server image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/server:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-client:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/booking-movie-ticket-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch build-time env vars from SSM
        id: fetch-env
        run: |
          # Fetch the full .env content from SSM
          ENV_CONTENT=$(aws ssm get-parameter \
            --name "/booking-movie-ticket/prod/env" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)

          # Extract VITE_ variables for client build args
          VITE_BASE_URL=$(echo "$ENV_CONTENT" | grep '^VITE_BASE_URL=' | cut -d'=' -f2- || echo "")
          VITE_CLERK_PUBLISHABLE_KEY=$(echo "$ENV_CONTENT" | grep '^VITE_CLERK_PUBLISHABLE_KEY=' | cut -d'=' -f2-)
          VITE_TMDB_IMAGE_BASE_URL=$(echo "$ENV_CONTENT" | grep '^VITE_TMDB_IMAGE_BASE_URL=' | cut -d'=' -f2-)
          VITE_CURRENCY=$(echo "$ENV_CONTENT" | grep '^VITE_CURRENCY=' | cut -d'=' -f2-)

          echo "VITE_BASE_URL=$VITE_BASE_URL" >> $GITHUB_OUTPUT
          echo "VITE_CLERK_PUBLISHABLE_KEY=$VITE_CLERK_PUBLISHABLE_KEY" >> $GITHUB_OUTPUT
          echo "VITE_TMDB_IMAGE_BASE_URL=$VITE_TMDB_IMAGE_BASE_URL" >> $GITHUB_OUTPUT
          echo "VITE_CURRENCY=$VITE_CURRENCY" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Client image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/client:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/client:latest
          build-args: |
            VITE_BASE_URL=${{ steps.fetch-env.outputs.VITE_BASE_URL }}
            VITE_CLERK_PUBLISHABLE_KEY=${{ steps.fetch-env.outputs.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_TMDB_IMAGE_BASE_URL=${{ steps.fetch-env.outputs.VITE_TMDB_IMAGE_BASE_URL }}
            VITE_CURRENCY=${{ steps.fetch-env.outputs.VITE_CURRENCY }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  deploy:
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    timeout-minutes: 30
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/booking-movie-ticket-github-deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Cancel any in-progress Instance Refresh
        run: |
          EXISTING=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "Found in-progress refresh: $EXISTING. Cancelling..."
            aws autoscaling cancel-instance-refresh --auto-scaling-group-name "${{ env.ASG_NAME }}"
            # Poll until cancel completes instead of fixed sleep
            for i in $(seq 1 20); do
              STATUS=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "${{ env.ASG_NAME }}" \
                --instance-refresh-ids "$EXISTING" \
                --query "InstanceRefreshes[0].Status" \
                --output text)
              echo "Cancel status: $STATUS"
              if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "Failed" ]; then
                break
              fi
              sleep 10
            done
          else
            echo "No in-progress refresh found. Proceeding."
          fi

      - name: Deploy via ASG Instance Refresh
        run: |
          echo "Starting ASG Instance Refresh for ${{ env.ASG_NAME }}..."
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ env.ASG_NAME }}" \
            --preferences '{"MinHealthyPercentage": 100}' \
            --query "InstanceRefreshId" \
            --output text)

          echo "Instance Refresh Started: $REFRESH_ID"
          DEADLINE=$(( $(date +%s) + 1500 ))  # 25-minute timeout

          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ env.ASG_NAME }}" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)

            echo "Current status: $STATUS"
            if [ "$STATUS" = "Successful" ]; then
              echo "Deployment Successful!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment Failed or Cancelled!"
              exit 1
            fi

            if [ $(date +%s) -ge $DEADLINE ]; then
              echo "ERROR: Timed out after 25 minutes."
              aws autoscaling cancel-instance-refresh --auto-scaling-group-name "${{ env.ASG_NAME }}" || true
              exit 1
            fi

            sleep 30
          done
