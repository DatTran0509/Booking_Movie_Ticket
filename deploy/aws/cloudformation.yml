AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cloud-Native Architecture for Booking Movie Ticket: ALB + ASG + EC2'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Select your Default VPC
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Select at least TWO public subnets in your Default VPC
  InstanceType:
    Type: String
    Description: 'EC2 instance type (t3.micro is Free Tier eligible)'
    Default: 't3.micro'
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
      - t3.medium
  CertificateArn:
    Type: String
    Description: 'Optional: The ARN of your AWS ACM Certificate for HTTPS. If left blank, ALB will only listen on HTTP (Port 80) until you add an HTTPS listener manually.'
    Default: ''
  GitHubRepo:
    Type: String
    Description: 'GitHub repository in the format owner/repo (e.g. DatTran0509/Booking_Movie_Ticket)'
    Default: 'DatTran0509/Booking_Movie_Ticket'
  CreateGitHubOIDCProvider:
    Type: String
    Description: 'Set to true only on first deploy if the GitHub OIDC provider does not yet exist in this AWS account.'
    Default: 'false'
    AllowedValues: ['true', 'false']

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]
  ShouldCreateOIDCProvider: !Equals [!Ref CreateGitHubOIDCProvider, 'true']

Resources:
  # GitHub Actions OIDC Provider (only created if CreateGitHubOIDCProvider=true)
  # On subsequent updates, set CreateGitHubOIDCProvider=false (default) to skip.
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  # IAM Role for GitHub Actions CI/CD Pipeline
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: booking-movie-ticket-github-deploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                'token.actions.githubusercontent.com:aud': sts.amazonaws.com
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubRepo}:*'
      Policies:
        - PolicyName: GitHubActionsDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # ASG Instance Refresh
              - Effect: Allow
                Action:
                  - autoscaling:StartInstanceRefresh
                  - autoscaling:CancelInstanceRefresh
                  - autoscaling:DescribeInstanceRefreshes
                Resource: '*'
              # ECR Authentication
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              # ECR Push to our repositories
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource:
                  - !Sub 'arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/booking-movie-ticket/*'
              # SSM Read for build-time env vars
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/booking-movie-ticket/prod/env'

  CloudflarePrefixList:
    Type: AWS::EC2::PrefixList
    Properties:
      PrefixListName: Cloudflare-IPv4
      AddressFamily: IPv4
      MaxEntries: 20
      Entries:
        - Cidr: 173.245.48.0/20
        - Cidr: 103.21.244.0/22
        - Cidr: 103.22.200.0/22
        - Cidr: 103.31.4.0/22
        - Cidr: 141.101.64.0/18
        - Cidr: 108.162.192.0/18
        - Cidr: 190.93.240.0/20
        - Cidr: 188.114.96.0/20
        - Cidr: 197.234.240.0/22
        - Cidr: 198.41.128.0/17
        - Cidr: 162.158.0.0/15
        - Cidr: 104.16.0.0/13
        - Cidr: 104.24.0.0/14
        - Cidr: 172.64.0.0/13
        - Cidr: 131.0.72.0/22

  # ECR Repositories for pre-built Docker images
  ServerECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: booking-movie-ticket/server
      EmptyOnDelete: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }

  ClientECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: booking-movie-ticket/client
      EmptyOnDelete: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # IAM Role for EC2 instances to read from SSM Parameter Store
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: SSMParameterAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/booking-movie-ticket/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # Security Group for Load Balancer (Public Access)
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP and HTTPS inbound to ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourcePrefixListId: !GetAtt CloudflarePrefixList.PrefixListId
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourcePrefixListId: !GetAtt CloudflarePrefixList.PrefixListId

  # Security Group for EC2 Instances (Access ONLY from ALB, SSH via SSM)
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB (SSH managed via SSM)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !GetAtt ALBSecurityGroup.GroupId

  # Application Load Balancer
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: booking-movie-alb
      Subnets: !Ref SubnetIds
      SecurityGroups:
        - !GetAtt ALBSecurityGroup.GroupId
      Scheme: internet-facing

  # Target Group for ALB to forward to EC2
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: booking-movie-tg
      VpcId: !Ref VpcId
      Port: 80
      Protocol: HTTP
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # ALB Listener (HTTP)
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        !If 
          - HasCertificate
          - - Type: redirect
              RedirectConfig:
                Protocol: HTTPS
                Port: '443'
                Host: '#{host}'
                Path: '/#{path}'
                Query: '#{query}'
                StatusCode: HTTP_301
          - - Type: forward
              TargetGroupArn: !Ref TargetGroup

  # ALB Listener (HTTPS) - Only created if CertificateArn is provided
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # Launch Template for Auto Scaling Group
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: booking-movie-lt
      LaunchTemplateData:
        ImageId: resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !GetAtt EC2SecurityGroup.GroupId
        # UserData: EC2 pulls pre-built images from ECR — no build step needed.
        UserData: 
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euo pipefail
            exec > >(tee /var/log/user-data.log) 2>&1

            APP_ROOT="/opt/booking-movie-ticket"
            APP_DIR="$APP_ROOT/app"
            BRANCH="main"
            REGION="${AWS::Region}"
            ECR_REGISTRY="${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com"
            SSM_ENV_PARAM_NAME="/booking-movie-ticket/prod/env"

            # 1. Update and install dependencies
            yum update -y
            yum install -y docker git amazon-cloudwatch-agent
            systemctl enable docker
            systemctl start docker
            usermod -a -G docker ec2-user || true

            # 2. Configure and start CloudWatch Agent to ship Docker logs
            cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWEOF'
            {
              "agent": { "run_as_user": "root" },
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [{
                      "file_path": "/var/lib/docker/containers/**/*-json.log",
                      "log_group_name": "/booking-movie-ticket/docker",
                      "log_stream_name": "{instance_id}",
                      "timezone": "UTC",
                      "multi_line_start_pattern": "^\\{",
                      "timestamp_format": "%Y-%m-%dT%H:%M:%S.%fZ"
                    }]
                  }
                }
              }
            }
            CWEOF
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config -m ec2 \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s

            # 3. Install Docker Compose v2
            mkdir -p /usr/local/lib/docker/cli-plugins
            curl -SL "https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
            chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

            # 4. Setup Directories
            mkdir -p "$APP_ROOT/shared"
            chown -R ec2-user:ec2-user "$APP_ROOT"

            # 5. Pull docker-compose.yml from repo (only config file, no build needed)
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --branch "$BRANCH" --single-branch --depth 1 "https://github.com/DatTran0509/Booking_Movie_Ticket.git" "$APP_DIR"
            else
              git -C "$APP_DIR" fetch origin
              git -C "$APP_DIR" checkout "$BRANCH"
              git -C "$APP_DIR" pull --ff-only origin "$BRANCH"
            fi

            # 6. Fetch secrets from AWS SSM Parameter Store
            echo "Fetching secrets from AWS SSM..."
            aws ssm get-parameter --name "$SSM_ENV_PARAM_NAME" --with-decryption --region "$REGION" --query "Parameter.Value" --output text > "$APP_DIR/.env"
            # Append ECR registry so docker-compose can reference images
            printf '\nECR_REGISTRY=%s\n' "$ECR_REGISTRY" >> "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"

            # 7. Login to ECR and pull pre-built images, then start
            export AWS_REGION="$REGION"
            aws ecr get-login-password --region "$REGION" | \
              docker login --username AWS --password-stdin "$ECR_REGISTRY"

            cd "$APP_DIR"
            docker compose pull
            docker compose --project-name "booking-movie-ticket" up -d --remove-orphans
            echo "User Data Bootstrap completed successfully."

  # Auto Scaling Group
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT5M
        WaitOnResourceSignals: false
    Properties:
      AutoScalingGroupName: booking-movie-asg
      VPCZoneIdentifier: !Ref SubnetIds
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      MinSize: '1'
      MaxSize: '3'
      DesiredCapacity: '1'
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300

  # Auto Scaling Policy (Scale out/in to maintain 70% CPU)
  CPUScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 70.0

Outputs:
  LoadBalancerDNS:
    Description: DNS Name of the Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
